<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>配達ペースチェッカー</title>

<style>
:root{
    --color-bg:#ffffff;
    --color-surface:#f6f8f6;
    --color-card:#ffffff;
    --color-text:#545454;
    --color-muted:#777777;
    --color-primary:#4caf50;
    --color-primary-dark:#2e7d32;
    --color-danger:#c62828;
    --color-border:#dce6dc;
    --shadow-card:0 4px 8px rgba(0,0,0,0.10);
    --radius-card:12px;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial,sans-serif;
    background:var(--color-bg);
    color:var(--color-text);
    line-height:1.5;
    padding-bottom:calc(380px + env(safe-area-inset-bottom));
}

body.inputs-collapsed{
    padding-bottom:calc(176px + env(safe-area-inset-bottom));
}

.main{
    max-width:640px;
    margin:0 auto;
    padding:12px;
}

.card{
    background:var(--color-card);
    border:1px solid var(--color-border);
    border-radius:var(--radius-card);
    padding:16px;
    margin-bottom:12px;
    box-shadow:var(--shadow-card);
}

.label{
    color:var(--color-muted);
    font-size:14px;
    margin-bottom:6px;
    font-weight:bold;
}

.metrics-card{
    padding:14px;
}

.metrics-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.metric-main{
    grid-column:1 / -1;
    padding:4px 0 8px;
    border-bottom:1px solid var(--color-border);
}

.metric-sub{
    padding-top:4px;
}

.time{
    font-size:34px;
    font-weight:bold;
    color:var(--color-text);
}

.hourly{
    font-size:52px;
    font-weight:bold;
    color:var(--color-primary-dark);
    line-height:1.1;
}

.mid{
    font-size:30px;
    font-weight:bold;
    color:var(--color-text);
    line-height:1.2;
}

.value{
    font-size:22px;
    margin-top:8px;
    color:var(--color-text);
}

.settings input{
    width:100%;
    font-size:22px;
    padding:12px;
    margin-bottom:12px;
    border:1px solid var(--color-border);
    border-radius:8px;
    color:var(--color-text);
    background:#fff;
    text-align:right;
}

.elapsed-edit{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:12px;
}

.elapsed-edit input{
    margin-bottom:0;
}

.elapsed-unit{
    position:relative;
}

.elapsed-unit span{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    color:var(--color-muted);
    font-size:14px;
    pointer-events:none;
}

.elapsed-unit input{
    padding-right:38px;
}

.elapsedApplyBtn{
    width:100%;
    font-size:18px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--color-primary-dark);
    color:#fff;
    font-weight:bold;
    margin-bottom:12px;
}

.inline-input{
    width:100%;
    font-size:22px;
    padding:12px;
    margin:6px 0 12px;
    border:1px solid var(--color-border);
    border-radius:8px;
    color:var(--color-text);
    background:#fff;
    text-align:right;
}

.settings input:focus,
.salesInput:focus,
.odometerInput:focus,
.inline-input:focus{
    outline:2px solid var(--color-primary);
    border-color:var(--color-primary);
}

.baseline-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.baseline-note{
    color:var(--color-muted);
    font-size:13px;
    margin:-4px 0 12px;
}

.distance-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
}

.distance-item{
    background:var(--color-surface);
    border-radius:8px;
    padding:10px;
}

.distance-item.wide{
    grid-column:1 / -1;
}

.distance-value{
    color:var(--color-text);
    font-size:20px;
    font-weight:bold;
    line-height:1.25;
}

.distance-note{
    color:var(--color-muted);
    font-size:13px;
    margin-top:4px;
}

.startBtn{
    width:100%;
    font-size:24px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:var(--color-primary);
    color:#fff;
    font-weight:bold;
}

.importBtn{
    width:100%;
    font-size:20px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:var(--color-primary-dark);
    color:#fff;
    font-weight:bold;
    margin-top:12px;
}

.reset-container{
    margin-bottom:12px;
}

.reset-btn{
    width:100%;
    background:#fff;
    color:var(--color-danger);
    border:1.5px solid var(--color-danger);
    border-radius:10px;
    padding:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.reset-btn:active,
.startBtn:active,
.importBtn:active,
.countButtons button:active,
.pauseBtn:active{
    transform:scale(0.98);
}

.fixedArea{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    background:var(--color-card);
    border-top:1px solid var(--color-border);
    box-shadow:0 -4px 14px rgba(0,0,0,0.14);
}

.inputToggleBtn{
    width:100%;
    border:none;
    border-top:1px solid var(--color-border);
    background:#fff;
    color:var(--color-primary-dark);
    font-size:16px;
    font-weight:bold;
    padding:10px;
}

.inputArea{
    display:block;
}

body.inputs-collapsed .inputArea{
    display:none;
}

.quick-switch-bar{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom));
    background:#fff;
    border-top:1px solid var(--color-border);
}

.quick-switch-btn{
    min-height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:2px solid var(--color-primary);
    border-radius:8px;
    background:#fff;
    color:var(--color-primary-dark);
    font-size:20px;
    font-weight:bold;
    text-decoration:none;
}

.quick-switch-btn.active{
    background:var(--color-primary);
    color:#fff;
}

.quick-switch-btn:active{
    transform:scale(0.98);
}

.pauseBtn{
    width:100%;
    border:none;
    color:#fff;
    font-size:24px;
    font-weight:bold;
    padding:14px;
}

.running{
    background:var(--color-danger);
}

.paused{
    background:var(--color-primary-dark);
}

.bottom{
    display:flex;
    align-items:flex-start;
    border-top:1px solid var(--color-border);
}

.panel{
    width:33.333%;
    padding:8px 10px 10px;
}

.panel:not(:last-child){
    border-right:1px solid var(--color-border);
}

.sales-panel{
    display:flex;
    flex-direction:column;
}

.panelTitle{
    font-size:16px;
    margin-bottom:6px;
    color:var(--color-muted);
    font-weight:bold;
}

.panelHint{
    font-size:12px;
    color:var(--color-muted);
    margin-top:-2px;
    margin-bottom:6px;
    line-height:1.3;
}

.countValue{
    text-align:center;
    font-size:34px;
    font-weight:bold;
    margin-bottom:6px;
    color:var(--color-text);
    line-height:1.1;
}

.salesInput,
.odometerInput{
    width:100%;
    height:64px;
    font-size:26px;
    text-align:center;
    border:1px solid var(--color-border);
    border-radius:8px;
    color:var(--color-text);
    background:#fff;
}

.countButtons{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:repeat(2, 54px);
    gap:8px;
}

.countButtons button{
    font-size:20px;
    height:auto;
    border:none;
    border-radius:8px;
    background:var(--color-primary);
    color:#fff;
    font-weight:bold;
}

.small{
    font-size:20px;
    margin-top:4px;
}

.positive{
    color:var(--color-primary-dark);
    font-weight:bold;
}

.negative{
    color:var(--color-danger);
    font-weight:bold;
}

.toast{
    position:fixed;
    left:50%;
    bottom:calc(358px + env(safe-area-inset-bottom));
    z-index:2000;
    transform:translateX(-50%);
    max-width:calc(100vw - 24px);
    padding:12px 18px;
    border-radius:8px;
    background:#333;
    color:#fff;
    font-weight:bold;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s ease;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.toast.show{
    opacity:1;
}

.toast.success{
    background:var(--color-primary-dark);
}

.toast.error{
    background:var(--color-danger);
}

body.inputs-collapsed .toast{
    bottom:calc(176px + env(safe-area-inset-bottom));
}

@media (max-width:420px){
    body{
        padding-bottom:calc(370px + env(safe-area-inset-bottom));
    }

    body.inputs-collapsed{
        padding-bottom:calc(176px + env(safe-area-inset-bottom));
    }

    .main{
        padding:10px;
    }

    .card{
        padding:12px;
    }

    .hourly{
        font-size:44px;
    }

    .time{
        font-size:28px;
    }

    .mid{
        font-size:26px;
    }

    .distance-grid{
        gap:8px;
    }

    .distance-value{
        font-size:18px;
    }

    .countButtons{
        grid-template-rows:repeat(2, 52px);
    }

.salesInput,
    .odometerInput{
        height:60px;
        font-size:22px;
    }

    .pauseBtn{
        font-size:22px;
        padding:12px;
    }

    .quick-switch-btn{
        min-height:54px;
    }

    .toast{
        bottom:calc(378px + env(safe-area-inset-bottom));
    }

    body.inputs-collapsed .toast{
        bottom:calc(176px + env(safe-area-inset-bottom));
    }
}
</style>
</head>

<body>

<div class="main">

<div class="card metrics-card">
<div class="metrics-grid">
<div class="metric-main">
<div class="label">換算時給</div>
<div id="hourlyRate" class="hourly">0円/h</div>
</div>

<div class="metric-sub">
<div class="label">件数/h</div>
<div id="countRate" class="mid">0.00件/h</div>
</div>

<div class="metric-sub">
<div class="label">経過時間</div>
<div id="timer" class="time">00:00:00</div>
</div>
</div>
</div>

<div class="card">
<div class="label">目標との差</div>

<div id="hourlyGap" class="value"></div>
<div id="countGap" class="value"></div>
</div>

<div class="card">
<div class="label">終了予測</div>

<div id="forecastSales" class="value"></div>
<div id="forecastCount" class="value"></div>
</div>

<div class="card">
<div class="distance-grid">
<div class="distance-item wide">
<div class="label">稼働中走行距離</div>
<div id="distanceKm" class="distance-value">-</div>
<div id="projectedDistance" class="distance-note"></div>
</div>

<div class="distance-item">
<div class="label">1件あたり</div>
<div id="distancePerDelivery" class="distance-value">-</div>
</div>

<div class="distance-item">
<div class="label">稼働km単価</div>
<div id="salesPerKm" class="distance-value">-</div>
</div>

<div class="distance-item">
<div class="label">1件あたり時間</div>
<div id="minutesPerDelivery" class="distance-value">-</div>
</div>

<div class="distance-item">
<div class="label">平均速度</div>
<div id="averageSpeed" class="distance-value">-</div>
</div>

<div class="distance-item wide">
<div class="label">kmあたり時間</div>
<div id="minutesPerKm" class="distance-value">-</div>
</div>
</div>

<button class="importBtn" onclick="saveImportForSumureco()">スムレコに反映</button>
</div>

<div class="card settings">

<div class="label">目標時給</div>
<input id="targetHourly" type="number">

<div class="label">目標件数/h</div>
<input id="targetCount" type="number" step="0.1">

<div class="label">予定稼働時間</div>
<input id="plannedHours" type="number" step="0.1">

<div class="label">経過時間を編集</div>
<div class="elapsed-edit">
    <div class="elapsed-unit">
        <input id="elapsedHours" type="number" min="0" step="1" inputmode="numeric">
        <span>時間</span>
    </div>
    <div class="elapsed-unit">
        <input id="elapsedMinutes" type="number" min="0" max="59" step="1" inputmode="numeric">
        <span>分</span>
    </div>
</div>
<button class="elapsedApplyBtn" onclick="applyElapsedEdit()">経過時間を反映</button>

<div class="label">開始メーター距離（km）</div>
<input id="startOdometer" type="number" step="0.1" inputmode="decimal">

<div class="label">開始時の件数・売上</div>
<div class="baseline-grid">
    <input id="startCount" type="number" min="0" step="1" inputmode="numeric" placeholder="件数">
    <input id="startSales" type="number" min="0" step="1" inputmode="numeric" placeholder="売上">
</div>
<div class="baseline-note">配達アプリに残っている朝4時以降の累計分を差し引きます。</div>

<div class="reset-container">
    <button class="reset-btn" onclick="resetStorage()">データをリセット</button>
</div>

<button class="startBtn" onclick="startWork()">稼働開始</button>

</div>

</div>

<div class="toast" id="toast"></div>

<div class="fixedArea">

<button id="pauseBtn"
class="pauseBtn running"
onclick="togglePause()">
一時停止
</button>

<button id="inputToggleBtn"
class="inputToggleBtn"
type="button"
onclick="toggleInputArea()">
入力欄を隠す
</button>

<div id="inputArea" class="inputArea">

<div class="bottom">

<div class="panel">

<div class="panelTitle">件数</div>
<div class="panelHint">差引後</div>

<div id="countDisplay"
class="countValue">0</div>

<div class="countButtons">
<button onclick="changeCount(-1)">-1</button>
<button onclick="changeCount(1)">+1</button>
<button onclick="changeCount(5)">+5</button>
<button onclick="changeCount(10)">+10</button>
</div>

</div>

<div class="panel sales-panel">

<div class="panelTitle">売上</div>
<div class="panelHint">アプリ表示</div>

<input
id="sales"
class="salesInput"
type="number"
inputmode="numeric">

</div>

<div class="panel">

<div class="panelTitle">現在km</div>
<div class="panelHint">メーター</div>

<input
id="currentOdometer"
class="odometerInput"
type="number"
step="0.1"
inputmode="decimal">

</div>

</div>

</div>

<nav class="quick-switch-bar" aria-label="稼働中ツール切替">
<a class="quick-switch-btn" href="../sumucopy/index.html">定型文</a>
<a class="quick-switch-btn active" href="./preview.html" aria-current="page">ペース</a>
</nav>

</div>

<script>

const STORAGE_KEY = "delivery_pace_v3";
const IMPORT_KEY = "sumureco.importFromPace.v1";

let state = {
    startTime:null,
    paused:false,
    pauseStart:null,
    pausedTotal:0,
    count:0,
    sales:0,
    targetHourly:0,
    targetCount:0,
    plannedHours:0,
    startOdometer:0,
    currentOdometer:0,
    startCount:0,
    startSales:0,
    inputsCollapsed:false
};

function resetStorage(){
    if(confirm("ローカルストレージのデータをリセットしますか？")){
        localStorage.removeItem(STORAGE_KEY);
        state = {
            startTime:null,
            paused:false,
            pauseStart:null,
            pausedTotal:0,
            count:0,
            sales:0,
            targetHourly:0,
            targetCount:0,
            plannedHours:0,
            startOdometer:0,
            currentOdometer:0,
            startCount:0,
            startSales:0,
            inputsCollapsed:false
        };
        sales.value = "";
        startCount.value = "";
        startSales.value = "";
        targetHourly.value = "";
        targetCount.value = "";
        plannedHours.value = "";
        elapsedHours.value = "";
        elapsedMinutes.value = "";
        startOdometer.value = "";
        currentOdometer.value = "";
        countDisplay.textContent = "0";
        applyInputAreaState();
        updatePauseButton();
        update();
        showToast("データをリセットしました");
    }
}

function showToast(message, type = "success"){
    const toast =
        document.getElementById("toast");

    if(!toast){
        return;
    }

    toast.textContent = message;
    toast.className =
        "toast " + type + " show";

    setTimeout(
        () => {
            toast.classList.remove("show");
        },
        1800
    );
}

function saveImportForSumureco(){
    const elapsed =
        getElapsedMs();

    const effectiveCount =
        getEffectiveCount();

    const effectiveSales =
        getEffectiveSales();

    const start =
        Number(startOdometer.value)||0;

    const current =
        Number(currentOdometer.value)||0;

    const distance =
        current > start
        ? current - start
        : 0;

    const payload = {
        source:"pace",
        workMinutes:Math.round(elapsed / 60000),
        deliveries:effectiveCount,
        sales:effectiveSales,
        startOdometer:start,
        endOdometer:current,
        distanceKm:Number(distance.toFixed(1)),
        createdAt:new Date().toISOString()
    };

    try{
        localStorage.setItem(
            IMPORT_KEY,
            JSON.stringify(payload)
        );

        showToast("スムレコに反映しました");
    }catch(e){
        showToast(
            "反映データを保存できませんでした",
            "error"
        );
    }
}

function saveState(){
    state.sales = Number(sales.value)||0;
    state.startCount = Number(startCount.value)||0;
    state.startSales = Number(startSales.value)||0;
    state.targetHourly = Number(targetHourly.value)||0;
    state.targetCount = Number(targetCount.value)||0;
    state.plannedHours = Number(plannedHours.value)||0;
    state.startOdometer = Number(startOdometer.value)||0;
    state.currentOdometer = Number(currentOdometer.value)||0;

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(state)
    );
}

function setElapsedInputs(ms){
    const totalMinutes =
        Math.max(
            0,
            Math.floor(ms / 60000)
        );

    elapsedHours.value =
        totalMinutes
        ? Math.floor(totalMinutes / 60)
        : "";

    elapsedMinutes.value =
        totalMinutes
        ? totalMinutes % 60
        : "";
}

function loadState(){

    const data =
    localStorage.getItem(STORAGE_KEY);

    if(data){
        try{
            state = {
                ...state,
                ...JSON.parse(data)
            };
        }catch(e){
            showToast(
                "保存データを読み込めませんでした",
                "error"
            );
        }
    }

    sales.value = state.sales || "";
    startCount.value =
        state.startCount || "";

    startSales.value =
        state.startSales || "";

    targetHourly.value =
        state.targetHourly || "";

    targetCount.value =
        state.targetCount || "";

    plannedHours.value =
        state.plannedHours || "";

    startOdometer.value =
        state.startOdometer || "";

    currentOdometer.value =
        state.currentOdometer || "";

    countDisplay.textContent =
        getEffectiveCount();

    setElapsedInputs(
        getElapsedMs()
    );

    applyInputAreaState();
    updatePauseButton();
}

function startWork(){

    if(state.startTime){
        return;
    }

    state.startTime = Date.now();

    saveState();
}

function applyElapsedEdit(){
    const hours =
        Math.max(
            0,
            Math.floor(Number(elapsedHours.value)||0)
        );

    const minutes =
        Math.max(
            0,
            Math.floor(Number(elapsedMinutes.value)||0)
        );

    const totalMinutes =
        hours * 60 + minutes;

    if(totalMinutes <= 0){
        showToast(
            "経過時間を入力してください",
            "error"
        );
        return;
    }

    const now =
        Date.now();

    const currentPause =
        state.paused && state.pauseStart
        ? now - state.pauseStart
        : 0;

    state.startTime =
        now
        - state.pausedTotal
        - currentPause
        - totalMinutes * 60000;

    saveState();
    update();
    setElapsedInputs(
        getElapsedMs()
    );
    showToast("経過時間を反映しました");
}

function togglePause(){

    if(!state.startTime){
        return;
    }

    if(state.paused){

        state.paused = false;

        state.pausedTotal +=
            Date.now()
            - state.pauseStart;

        state.pauseStart = null;

    }else{

        state.paused = true;

        state.pauseStart =
            Date.now();
    }

    updatePauseButton();
    saveState();
}

function updatePauseButton(){

    const btn =
        document.getElementById("pauseBtn");

    if(state.paused){

        btn.textContent = "再開";
        btn.className =
            "pauseBtn paused";

    }else{

        btn.textContent =
            "一時停止";

        btn.className =
            "pauseBtn running";
    }
}

function changeCount(amount){

    state.count =
        Math.max(
            0,
            state.count + amount
        );

    countDisplay.textContent =
        getEffectiveCount();

    saveState();
    update();
}

function getEffectiveCount(){
    return Math.max(
        0,
        (Number(state.count)||0)
        - (Number(startCount.value)||0)
    );
}

function getEffectiveSales(){
    return Math.max(
        0,
        (Number(sales.value)||0)
        - (Number(startSales.value)||0)
    );
}

function toggleInputArea(){
    state.inputsCollapsed =
        !state.inputsCollapsed;

    applyInputAreaState();
    saveState();
}

function applyInputAreaState(){
    document.body.classList.toggle(
        "inputs-collapsed",
        Boolean(state.inputsCollapsed)
    );

    const btn =
        document.getElementById("inputToggleBtn");

    if(btn){
        btn.textContent =
            state.inputsCollapsed
            ? "入力欄を表示"
            : "入力欄を隠す";
    }
}

function getElapsedMs(){

    if(!state.startTime){
        return 0;
    }

    const now = Date.now();

    const currentPause =
        state.paused
        ? now - state.pauseStart
        : 0;

    return now
        - state.startTime
        - state.pausedTotal
        - currentPause;
}

function formatTime(ms){

    const total =
        Math.floor(ms/1000);

    const h =
        Math.floor(total/3600);

    const m =
        Math.floor(
            (total%3600)/60
        );

    const s =
        total%60;

    return [
        h,m,s
    ]
    .map(v =>
        String(v)
        .padStart(2,"0"))
    .join(":");
}

function update(){

    const elapsed =
        getElapsedMs();

    timer.textContent =
        formatTime(elapsed);

    const hours =
        elapsed/3600000;

    const sale =
        getEffectiveSales();

    const count =
        getEffectiveCount();

    countDisplay.textContent =
        count;

    const hourly =
        hours>0
        ? sale/hours
        : 0;

    const countPerHour =
        hours>0
        ? count/hours
        : 0;

    hourlyRate.textContent =
        Math.round(hourly)
        .toLocaleString()
        + "円/h";

    countRate.textContent =
        countPerHour.toFixed(2)
        + "件/h";

    updateGoals(
        hourly,
        countPerHour
    );

    updateForecast(
        hourly,
        countPerHour
    );

    updateDistanceMetrics(
        elapsed,
        hours,
        sale,
        count
    );

    saveState();
}

function formatOneDecimal(value, unit){
    if(
        !Number.isFinite(value)
        || value <= 0
    ){
        return "-";
    }

    return value.toFixed(1) + unit;
}

function updateDistanceMetrics(
    elapsed,
    hours,
    sale,
    count
){
    const start =
        Number(startOdometer.value)||0;

    const current =
        Number(currentOdometer.value)||0;

    const distance =
        current > start
        ? current - start
        : 0;

    const minutes =
        elapsed / 60000;

    distanceKm.textContent =
        formatOneDecimal(
            distance,
            "km"
        );

    distancePerDelivery.textContent =
        formatOneDecimal(
            count > 0
            ? distance / count
            : 0,
            "km/件"
        );

    salesPerKm.textContent =
        formatOneDecimal(
            distance > 0
            ? sale / distance
            : 0,
            "円/km"
        );

    minutesPerDelivery.textContent =
        formatOneDecimal(
            count > 0
            ? minutes / count
            : 0,
            "分/件"
        );

    averageSpeed.textContent =
        formatOneDecimal(
            hours > 0
            ? distance / hours
            : 0,
            "km/h"
        );

    minutesPerKm.textContent =
        formatOneDecimal(
            distance > 0
            ? minutes / distance
            : 0,
            "分/km"
        );

    const planned =
        Number(plannedHours.value)||0;

    projectedDistance.textContent =
        distance > 0
        && hours > 0
        && planned > 0
        ? "予定終了時: "
            + (distance / hours * planned)
                .toFixed(1)
            + "km"
        : "";
}

function updateGoals(
    hourly,
    countPerHour
){

    const th =
        Number(
            targetHourly.value
        ) || 0;

    const tc =
        Number(
            targetCount.value
        ) || 0;

    if(th){

        const diff =
            Math.round(
                hourly-th
            );

        hourlyGap.innerHTML =
            '時給差 : <span class="'
            +(diff>=0
            ?'positive'
            :'negative')
            +'">'
            + diff.toLocaleString()
            +'円/h</span>';

    }else{

        hourlyGap.textContent="";
    }

    if(tc){

        const diff =
            countPerHour-tc;

        countGap.innerHTML =
            '件数差 : <span class="'
            +(diff>=0
            ?'positive'
            :'negative')
            +'">'
            + diff.toFixed(2)
            +'件/h</span>';

    }else{

        countGap.textContent="";
    }
}

function updateForecast(
    hourly,
    countPerHour
){

    const planned =
        Number(
            plannedHours.value
        ) || 0;

    if(!planned){

        forecastSales.textContent="";
        forecastCount.textContent="";
        return;
    }

    forecastSales.textContent =
        "予測売上 : "
        + Math.round(
            hourly*planned
        ).toLocaleString()
        + "円";

    forecastCount.textContent =
        "予測件数 : "
        + (
            countPerHour
            * planned
        ).toFixed(1)
        + "件";
}

[
sales,
startCount,
startSales,
targetHourly,
targetCount,
plannedHours,
elapsedHours,
elapsedMinutes,
startOdometer,
currentOdometer
].forEach(el=>{

    el.addEventListener(
        "input",
        ()=>{
            saveState();
            update();
        }
    );

    el.addEventListener(
        "focus",
        ()=>{
            setTimeout(() => {
                el.select();
            }, 0);
        }
    );
});

loadState();
update();

setInterval(
    update,
    1000
);

</script>

</body>
</html>
